name: Label MAsterclass

on:
  issues:
    types: [opened]

jobs:
  add-label:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Add masterclass label
        uses: actions/github-script@v7
        with:
          script: |
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['animatrice manquante', 'annonce manquante', 'date manquante', 'meetup manquant', 'contenu manquant']
              });